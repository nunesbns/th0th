name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - packages
          - apps
      tag:
        description: 'npm tag (latest, next, beta, alpha)'
        required: false
        default: 'latest'
        type: string
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        default: false
        type: boolean

env:
  NPM_TAG: ${{ inputs.tag || 'latest' }}
  DRY_RUN: ${{ inputs.dry-run == true && '--dry-run' || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages and apps
        run: bun run build

      - name: Resolve workspace dependencies
        run: |
          VERSION=$(jq -r '.version' packages/shared/package.json)
          echo "Resolving workspace:* → ^$VERSION"

          for pkg in packages/core/package.json apps/*/package.json; do
            if grep -q '"workspace:\*"' "$pkg"; then
              sed -i "s|\"workspace:\*\"|\"^$VERSION\"|g" "$pkg"
              echo "  ✓ Resolved in $pkg"
            fi
          done

      - name: Rename scope for npm publish (@th0th → @th0th-ai)
        run: |
          echo "Renaming @th0th/* → @th0th-ai/* in package.json files for npm"
          for pkg in packages/shared/package.json packages/core/package.json apps/*/package.json; do
            sed -i 's|@th0th/|@th0th-ai/|g' "$pkg"
            echo "  ✓ Renamed in $pkg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/shared/dist
            packages/shared/package.json
            packages/core/dist
            packages/core/prisma
            packages/core/package.json
            apps/tools-api/dist
            apps/tools-api/package.json
            apps/mcp-client/dist
            apps/mcp-client/package.json
            apps/opencode-plugin/dist
            apps/opencode-plugin/package.json
          retention-days: 1

  publish-packages:
    needs: build
    runs-on: ubuntu-latest
    environment: DEPLOY
    if: >-
      github.event_name == 'release' ||
      inputs.target == 'all' ||
      inputs.target == 'packages'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish @th0th-ai/shared
        working-directory: packages/shared
        run: bun publish --access public --tag ${{ env.NPM_TAG }} --tolerate-republish ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th-ai/core
        working-directory: packages/core
        run: bun publish --access public --tag ${{ env.NPM_TAG }} --tolerate-republish ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-apps:
    needs: [build, publish-packages]
    runs-on: ubuntu-latest
    environment: DEPLOY
    if: >-
      github.event_name == 'release' ||
      inputs.target == 'all' ||
      inputs.target == 'apps'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish @th0th-ai/tools-api
        working-directory: apps/tools-api
        run: bun publish --access public --tag ${{ env.NPM_TAG }} --tolerate-republish ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th-ai/mcp-client
        working-directory: apps/mcp-client
        run: bun publish --access public --tag ${{ env.NPM_TAG }} --tolerate-republish ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th-ai/opencode-plugin
        working-directory: apps/opencode-plugin
        run: bun publish --access public --tag ${{ env.NPM_TAG }} --tolerate-republish ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
